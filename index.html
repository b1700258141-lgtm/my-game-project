<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>万事屋炼金物语</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      min-height: 100%;
      background:
        radial-gradient(circle at 22% 18%, rgba(255, 210, 150, 0.28), transparent 34%),
        radial-gradient(circle at 80% 75%, rgba(190, 99, 53, 0.2), transparent 36%),
        linear-gradient(135deg, #5b2d1c 0%, #a9653a 45%, #efd09b 100%);
    }
    body {
      background:
        linear-gradient(rgba(95, 48, 28, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(95, 48, 28, 0.14) 1px, transparent 1px),
        radial-gradient(circle at 50% 42%, rgba(255, 224, 168, 0.34), transparent 36%),
        linear-gradient(135deg, #4f2819 0%, #9f5a32 48%, #f0cf93 100%);
      background-size: 72px 72px, 72px 72px, auto, auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    #game-container {
      border: 4px solid #7a472c;
      border-radius: 8px;
      box-shadow:
        0 20px 48px rgba(70, 32, 18, 0.42),
        0 0 0 2px rgba(255, 224, 168, 0.28),
        0 0 36px rgba(255, 196, 118, 0.24);
      image-rendering: pixelated;
    }
    #game-container canvas {
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
